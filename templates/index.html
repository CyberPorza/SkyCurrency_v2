<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCurrency v2.1 | Premium Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #121212; color: #e0e0e0; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border-radius: 16px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 255, 128, 0.1); }
        .premium-text { background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .stat-value { font-size: 2.5rem; font-weight: 600; color: #ffffff; }
        .stat-label { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .currency-icon { color: #f1c40f; }
        .weather-icon { color: #3498db; }
        #digital-clock { font-size: 1.2rem; font-weight: 300; color: #888; }
    </style>
</head>
<body>
    <div class="container py-5">
        <header class="d-flex justify-content-between align-items-center mb-5 pb-3 border-bottom border-secondary">
            <div>
                <h1 class="premium-text m-0">SkyCurrency <span class="fw-light">v2.1</span></h1>
                <p class="text-muted m-0">Istanbul Command Center</p>
            </div>
            <div class="text-end">
                <div id="digital-clock">--:--:--</div>
                <div class="text-success" style="font-size: 0.8rem;"><i class="fas fa-circle-notch fa-spin me-1"></i>Live Data</div>
            </div>
        </header>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="glass-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="m-0"><i class="fas fa-chart-line currency-icon me-2"></i>Piyasa Ekranı</h4>
                        <span class="badge bg-dark text-success">TRY Bazlı</span>
                    </div>
                    <div class="row text-center">
                        <div class="col-md-4 mb-3">
                            <div class="stat-label">DOLAR</div>
                            <div class="stat-value">{{ usd }}</div>
                            <div class="text-muted" style="font-size: 0.7rem;">₺ Türk Lirası</div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="stat-label">EURO</div>
                            <div class="stat-value">{{ eur }}</div>
                            <div class="text-muted" style="font-size: 0.7rem;">₺ Türk Lirası</div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-label">GRAM ALTIN</div>
                            <div class="stat-value text-warning">{{ gold }}</div>
                            <div class="text-muted" style="font-size: 0.7rem;">₺ (Hesaplanan)</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="glass-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="m-0"><i class="fas fa-cloud-sun weather-icon me-2"></i>Hava Durumu</h4>
                        <span class="badge bg-dark text-info">İstanbul</span>
                    </div>
                    <div class="d-flex align-items-center justify-content-around">
                        <div class="text-center">
                            <i class="fas fa-temperature-high fa-3x weather-icon mb-2"></i>
                            <div class="stat-value">{{ temp }}°C</div>
                            <div class="stat-label">{{ desc }}</div>
                        </div>
                        <div class="border-start border-secondary ps-3">
                            <p class="m-0 text-muted">Hissedilen: <strong class="text-white">{{ feels }}°C</strong></p>
                            <p class="m-0 text-muted">Nem: <strong class="text-white">%{{ hum }}</strong></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toLocaleTimeString('tr-TR');
        }
        setInterval(updateClock, 1000);
        updateClock();
        setTimeout(() => location.reload(), 300000); // 5 dk refresh
    </script>
</body>
</html>
